<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WWE Noughts & Crosses</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0a;
      background-image:
        radial-gradient(ellipse at top, #1a0000 0%, #0a0a0a 60%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      font-family: 'Nunito', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── TITLE ── */
    .title-wrap {
      text-align: center;
      margin-bottom: 10px;
    }
    .title-wrap h1 {
      font-family: 'Bangers', cursive;
      font-size: clamp(2.2rem, 7vw, 4rem);
      letter-spacing: 3px;
      color: #fff;
      text-shadow: 0 0 20px #ff0000, 3px 3px 0 #cc0000;
      line-height: 1;
    }
    .title-wrap .subtitle {
      font-family: 'Bangers', cursive;
      font-size: clamp(1rem, 3vw, 1.6rem);
      color: #ffd700;
      letter-spacing: 2px;
      text-shadow: 1px 1px 0 #b8860b;
    }

    /* ── SCOREBOARD ── */
    .scoreboard {
      display: flex;
      gap: 20px;
      margin: 14px 0;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 10px 24px;
    }
    .score-item {
      text-align: center;
    }
    .score-item .name {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.6);
    }
    .score-item .val {
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      line-height: 1;
    }
    .score-item.randy .val { color: #ff4444; }
    .score-item.draws .val { color: #aaa; }
    .score-item.roman .val { color: #3399ff; }
    .score-divider {
      width: 1px;
      background: rgba(255,255,255,0.15);
      margin: 0 4px;
    }

    /* ── PLAYER PANELS ── */
    .arena {
      display: flex;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 800px;
    }

    .player-card {
      flex: 0 0 130px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 14px 10px;
      border-radius: 16px;
      border: 3px solid transparent;
      transition: all 0.35s ease;
    }
    .player-card.active-card {
      transform: scale(1.06);
    }
    .player-card.randy-card {
      background: linear-gradient(135deg, #1a0000, #2d0000);
      border-color: #ff4444;
      box-shadow: 0 0 30px rgba(255,68,68,0.3);
    }
    .player-card.roman-card {
      background: linear-gradient(135deg, #00091a, #001830);
      border-color: #3399ff;
      box-shadow: 0 0 30px rgba(51,153,255,0.3);
    }
    .player-card.randy-card.active-card {
      box-shadow: 0 0 50px rgba(255,68,68,0.7), inset 0 0 20px rgba(255,68,68,0.1);
    }
    .player-card.roman-card.active-card {
      box-shadow: 0 0 50px rgba(51,153,255,0.7), inset 0 0 20px rgba(51,153,255,0.1);
    }

    .wrestler-emoji {
      font-size: 4rem;
      line-height: 1;
      transition: transform 0.3s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }
    .player-card.active-card .wrestler-emoji {
      animation: bounce 0.6s infinite alternate;
    }
    @keyframes bounce {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(-6px) scale(1.1); }
    }

    .player-name {
      font-family: 'Bangers', cursive;
      font-size: 1.05rem;
      letter-spacing: 1px;
      text-align: center;
      line-height: 1.1;
    }
    .randy-card .player-name { color: #ff6666; }
    .roman-card .player-name { color: #66b3ff; }

    .player-symbol {
      font-family: 'Bangers', cursive;
      font-size: 2rem;
      line-height: 1;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
    }
    .randy-card .player-symbol {
      color: #ff4444;
      background: rgba(255,68,68,0.15);
      border: 2px solid rgba(255,68,68,0.4);
    }
    .roman-card .player-symbol {
      color: #3399ff;
      background: rgba(51,153,255,0.15);
      border: 2px solid rgba(51,153,255,0.4);
    }

    .turn-badge {
      font-size: 0.65rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 8px;
      border-radius: 20px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .player-card.active-card .turn-badge { opacity: 1; }
    .randy-card .turn-badge { background: #ff4444; color: #fff; }
    .roman-card .turn-badge { background: #3399ff; color: #fff; }

    /* ── BOARD ── */
    .board-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .status-msg {
      font-family: 'Bangers', cursive;
      font-size: clamp(1.1rem, 3vw, 1.5rem);
      letter-spacing: 2px;
      color: #ffd700;
      text-shadow: 1px 1px 0 #b8860b;
      text-align: center;
      min-height: 2rem;
      transition: all 0.3s;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 14px;
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      border: 2px solid rgba(255,255,255,0.08);
    }

    .cell {
      width: clamp(80px, 18vw, 110px);
      height: clamp(80px, 18vw, 110px);
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(2.2rem, 7vw, 3.2rem);
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
      user-select: none;
    }
    .cell::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .cell:hover:not(.taken) {
      transform: scale(1.06);
      border-color: rgba(255,255,255,0.3);
    }
    .cell:hover:not(.taken)::before { opacity: 1; }
    .cell.taken { cursor: default; }

    .cell.randy-cell {
      background: rgba(255,68,68,0.12);
      border-color: rgba(255,68,68,0.5);
      box-shadow: inset 0 0 15px rgba(255,68,68,0.1);
    }
    .cell.roman-cell {
      background: rgba(51,153,255,0.12);
      border-color: rgba(51,153,255,0.5);
      box-shadow: inset 0 0 15px rgba(51,153,255,0.1);
    }
    .cell.winning-cell {
      animation: winPulse 0.5s ease infinite alternate;
    }
    @keyframes winPulse {
      from { transform: scale(1);   box-shadow: 0 0 10px rgba(255,215,0,0.4); }
      to   { transform: scale(1.08); box-shadow: 0 0 30px rgba(255,215,0,0.9); }
    }

    .cell-content {
      animation: popIn 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      from { transform: scale(0) rotate(-15deg); opacity: 0; }
      to   { transform: scale(1) rotate(0deg);   opacity: 1; }
    }

    /* ── BUTTONS ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn {
      font-family: 'Bangers', cursive;
      font-size: 1.1rem;
      letter-spacing: 2px;
      padding: 10px 22px;
      border-radius: 40px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
    }
    .btn:hover { transform: scale(1.06); }
    .btn:active { transform: scale(0.97); }

    .btn-reset {
      background: linear-gradient(135deg, #ff4444, #cc0000);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255,68,68,0.4);
    }
    .btn-newgame {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #111;
      box-shadow: 0 4px 16px rgba(255,215,0,0.4);
    }

    /* ── OVERLAY ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .overlay-box {
      background: linear-gradient(135deg, #1a1a1a, #0d0d0d);
      border-radius: 24px;
      padding: 40px 50px;
      text-align: center;
      border: 3px solid #ffd700;
      box-shadow: 0 0 60px rgba(255,215,0,0.3);
      animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      max-width: 90vw;
    }
    @keyframes slideUp {
      from { transform: translateY(60px) scale(0.8); opacity: 0; }
      to   { transform: translateY(0)    scale(1);   opacity: 1; }
    }

    .overlay-emoji { font-size: 5rem; margin-bottom: 10px; }
    .overlay-title {
      font-family: 'Bangers', cursive;
      font-size: clamp(2rem, 8vw, 3.5rem);
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    .overlay-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.65);
      margin-bottom: 24px;
    }

    .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 99; overflow: hidden; }
    .confetti-piece {
      position: absolute;
      width: 12px;
      height: 12px;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0)    rotate(0deg);   opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ── BELT ── */
    .belt-badge {
      display: inline-block;
      font-family: 'Bangers', cursive;
      font-size: 0.85rem;
      letter-spacing: 2px;
      padding: 4px 14px;
      border-radius: 20px;
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #111;
      box-shadow: 0 2px 10px rgba(255,215,0,0.5);
      margin-bottom: 6px;
    }

    /* ── FOOTER ── */
    footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: rgba(255,255,255,0.25);
      letter-spacing: 1px;
      text-align: center;
    }

    @media (max-width: 520px) {
      .arena { flex-direction: column; gap: 8px; }
      .player-card { flex-direction: row; flex: none; width: 100%; max-width: 320px; padding: 10px 16px; }
      .wrestler-emoji { font-size: 2.6rem; }
      .player-name { font-size: 0.9rem; }
    }
  </style>
</head>
<body>

<!-- Confetti container -->
<div class="confetti-wrap" id="confettiWrap"></div>

<!-- Title -->
<div class="title-wrap">
  <h1>🏆 WWE NOUGHTS & CROSSES 🏆</h1>
  <div class="subtitle">Randy Orton vs Roman Reigns</div>
</div>

<!-- Scoreboard -->
<div class="scoreboard">
  <div class="score-item randy">
    <div class="name">Randy</div>
    <div class="val" id="scoreRandy">0</div>
  </div>
  <div class="score-divider"></div>
  <div class="score-item draws">
    <div class="name">Draws</div>
    <div class="val" id="scoreDraws">0</div>
  </div>
  <div class="score-divider"></div>
  <div class="score-item roman">
    <div class="name">Roman</div>
    <div class="val" id="scoreRoman">0</div>
  </div>
</div>

<!-- Arena -->
<div class="arena">

  <!-- Randy Orton -->
  <div class="player-card randy-card active-card" id="cardRandy">
    <div class="wrestler-emoji">🐍</div>
    <div class="player-name">RANDY<br>ORTON</div>
    <div class="player-symbol">RKO</div>
    <div class="turn-badge">YOUR TURN</div>
  </div>

  <!-- Board -->
  <div class="board-wrap">
    <div class="status-msg" id="statusMsg">Randy Orton's Move!</div>
    <div class="board" id="board">
      <div class="cell" data-i="0"></div>
      <div class="cell" data-i="1"></div>
      <div class="cell" data-i="2"></div>
      <div class="cell" data-i="3"></div>
      <div class="cell" data-i="4"></div>
      <div class="cell" data-i="5"></div>
      <div class="cell" data-i="6"></div>
      <div class="cell" data-i="7"></div>
      <div class="cell" data-i="8"></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-reset" onclick="resetBoard()">🔄 Rematch</button>
      <button class="btn btn-newgame" onclick="newGame()">🏆 New Series</button>
    </div>
  </div>

  <!-- Roman Reigns -->
  <div class="player-card roman-card" id="cardRoman">
    <div class="wrestler-emoji">⚡</div>
    <div class="player-name">ROMAN<br>REIGNS</div>
    <div class="player-symbol">SP</div>
    <div class="turn-badge">YOUR TURN</div>
  </div>

</div>

<!-- Win overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <div class="belt-badge">🥊 WINNER 🥊</div>
    <div class="overlay-emoji" id="overlayEmoji">🐍</div>
    <div class="overlay-title" id="overlayTitle">RANDY WINS!</div>
    <div class="overlay-sub" id="overlaySub">RKO OUTTA NOWHERE!</div>
    <button class="btn btn-reset" style="margin-right:8px" onclick="closeOverlay(); resetBoard()">🔄 Rematch</button>
    <button class="btn btn-newgame" onclick="closeOverlay(); newGame()">🏆 New Series</button>
  </div>
</div>

<footer>WWE NOUGHTS &amp; CROSSES · FOR KIDS · HAVE FUN! 🎉</footer>

<script>
  // ── CONFIG ──
  const PLAYERS = {
    randy: {
      id: 'randy',
      name: 'Randy Orton',
      shortName: 'RANDY',
      emoji: '🐍',
      symbol: 'RKO',
      cellClass: 'randy-cell',
      cardId: 'cardRandy',
      quotes: [
        'RKO OUTTA NOWHERE!',
        "I HEAR VOICES IN MY HEAD!",
        'THE LEGEND KILLER STRIKES!',
        'PUNT KICK INCOMING!',
        "VINTAGE ORTON!",
      ]
    },
    roman: {
      id: 'roman',
      name: 'Roman Reigns',
      shortName: 'ROMAN',
      emoji: '⚡',
      symbol: 'SP',
      cellClass: 'roman-cell',
      cardId: 'cardRoman',
      quotes: [
        'BELIEVE THAT!',
        "YOU CAN'T SEE ME... WAIT, WRONG GUY!",
        'THE BIG DOG WINS!',
        'SUPERMAN PUNCH!',
        "ACKNOWLEDGE ME!",
      ]
    }
  };

  const WINS = [
    [0,1,2],[3,4,5],[6,7,8], // rows
    [0,3,6],[1,4,7],[2,5,8], // cols
    [0,4,8],[2,4,6]          // diags
  ];

  // ── STATE ──
  let board       = Array(9).fill(null); // null | 'randy' | 'roman'
  let currentTurn = 'randy';
  let gameOver    = false;
  let scores      = { randy: 0, roman: 0, draws: 0 };

  // ── INIT ──
  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => handleClick(+cell.dataset.i));
  });
  updateUI();

  // ── GAME LOGIC ──
  function handleClick(i) {
    if (gameOver || board[i]) return;
    board[i] = currentTurn;
    renderCell(i);

    const win = checkWin();
    if (win) {
      markWinCells(win);
      scores[currentTurn]++;
      updateScores();
      gameOver = true;
      setTimeout(() => showWinOverlay(currentTurn), 500);
      return;
    }
    if (board.every(Boolean)) {
      scores.draws++;
      updateScores();
      gameOver = true;
      setStatus("🤝 IT'S A DRAW!");
      return;
    }
    currentTurn = currentTurn === 'randy' ? 'roman' : 'randy';
    updateUI();
  }

  function checkWin() {
    return WINS.find(([a,b,c]) =>
      board[a] && board[a] === board[b] && board[b] === board[c]
    ) || null;
  }

  // ── RENDER ──
  function renderCell(i) {
    const p    = PLAYERS[board[i]];
    const cell = document.querySelector(`.cell[data-i="${i}"]`);
    cell.classList.add('taken', p.cellClass);
    cell.innerHTML = `<span class="cell-content" style="font-family:'Bangers',cursive;font-size:1.4rem;letter-spacing:1px;color:${p.id==='randy'?'#ff6666':'#66b3ff'}">${p.symbol}</span>`;
  }

  function markWinCells(combo) {
    combo.forEach(i => {
      document.querySelector(`.cell[data-i="${i}"]`).classList.add('winning-cell');
    });
  }

  function updateUI() {
    const p = PLAYERS[currentTurn];
    setStatus(`${p.name.toUpperCase()}'S MOVE!`);

    document.getElementById('cardRandy').classList.toggle('active-card', currentTurn === 'randy');
    document.getElementById('cardRoman').classList.toggle('active-card', currentTurn === 'roman');
  }

  function setStatus(msg) {
    document.getElementById('statusMsg').textContent = msg;
  }

  function updateScores() {
    document.getElementById('scoreRandy').textContent = scores.randy;
    document.getElementById('scoreRoman').textContent = scores.roman;
    document.getElementById('scoreDraws').textContent = scores.draws;
  }

  // ── WIN OVERLAY ──
  function showWinOverlay(winner) {
    const p = PLAYERS[winner];
    const quote = p.quotes[Math.floor(Math.random() * p.quotes.length)];
    document.getElementById('overlayEmoji').textContent = p.emoji;
    document.getElementById('overlayTitle').textContent = `${p.shortName} WINS!`;
    document.getElementById('overlaySub').textContent   = quote;
    document.getElementById('overlay').classList.add('show');
    spawnConfetti(winner === 'randy' ? '#ff4444' : '#3399ff');
  }

  function closeOverlay() {
    document.getElementById('overlay').classList.remove('show');
    clearConfetti();
  }

  // ── CONFETTI ──
  function spawnConfetti(mainColor) {
    const wrap = document.getElementById('confettiWrap');
    const colours = [mainColor, '#ffd700', '#ffffff', '#ff8c00', '#00ff99'];
    for (let i = 0; i < 80; i++) {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.cssText = `
        left: ${Math.random()*100}%;
        background: ${colours[Math.floor(Math.random()*colours.length)]};
        width: ${6+Math.random()*10}px;
        height: ${6+Math.random()*10}px;
        border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
        animation-duration: ${1.5+Math.random()*2}s;
        animation-delay: ${Math.random()*0.8}s;
      `;
      wrap.appendChild(piece);
    }
  }

  function clearConfetti() {
    document.getElementById('confettiWrap').innerHTML = '';
  }

  // ── RESET / NEW GAME ──
  function resetBoard() {
    board       = Array(9).fill(null);
    currentTurn = 'randy';
    gameOver    = false;
    document.querySelectorAll('.cell').forEach(cell => {
      cell.className = 'cell';
      cell.innerHTML = '';
    });
    updateUI();
  }

  function newGame() {
    scores = { randy: 0, roman: 0, draws: 0 };
    updateScores();
    resetBoard();
  }
</script>
</body>
</html>
